{% extends 'festival/layout.html' %}

{% block content %}
<h2>{{ concerto.banda }}</h2>
<p>Dia: {{ concerto.dia }}</p>
<p>Hora: {{ concerto.hora }}</p>
<p>Palco: {{ concerto.palco }}</p>

<a href="{% url 'editar_concerto' concerto.id %}">
    <button>Editar este concerto</button>
</a>

<form method="POST" action="{% url 'apagar_concerto' concerto.id %}">
    {% csrf_token %}
    <button type="submit">Apagar concerto</button>
</form>
{% endblock %}
